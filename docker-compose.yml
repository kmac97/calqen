# Production-oriented example for the future VPS. Not used in local dev — local dev keeps
# running each service directly via `doppler run -- pnpm dev:<service>` (see docs/deployment.md).
#
# Deliberately absent from this file:
#   - A `db` service — PostgreSQL is Supabase, external to this compose stack.
#   - A `runner` service — the Runner stays on the Windows PC per the Phase 1 dry-run boundary,
#     never in Docker.
#   - Any secret values — `env_file: .env` points at a server-side .env populated from Doppler at
#     deploy time; this file itself contains no secrets and is safe to commit.
#
# Networking (see docs/deployment.md "Networking"):
#   - `api` publishes only to 127.0.0.1:3001 on the host — Nginx (configured on the VPS,
#     outside this repo) is the sole public entry point and reverse-proxies to it.
#   - Containers reach the API over the compose network's internal DNS (`http://api:3001`),
#     never through the host's published port.
#   - The Windows Runner is outside this compose network entirely and calls the API through
#     Nginx's public URL (https://calqen.duckdns.org), never http://api:3001.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        GIT_SHA: ${GIT_SHA:-}
    env_file: .env
    ports:
      # Loopback-only — Nginx is the sole public entry point, proxying to this port from the host.
      - '127.0.0.1:3001:3001'
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
      args:
        GIT_SHA: ${GIT_SHA:-}
    env_file: .env
    environment:
      # Inside the bot container, localhost is the bot container itself, not the api container —
      # override the host-facing default from .env with the compose network's service DNS name.
      # (orchestrator never calls the API — it talks to Postgres directly — so it needs no override.)
      - CALQEN_API_URL=http://api:3001
    restart: unless-stopped
    depends_on:
      - api

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
      args:
        GIT_SHA: ${GIT_SHA:-}
    env_file: .env
    restart: unless-stopped
    depends_on:
      - api
