name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  build:
    name: typecheck, lint, test, docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Docker build — api
        run: docker build -f Dockerfile.api -t calqen-api:ci .

      - name: Docker build — bot
        run: docker build -f Dockerfile.bot -t calqen-bot:ci .

      - name: Docker build — orchestrator
        run: docker build -f Dockerfile.orchestrator -t calqen-orchestrator:ci .
